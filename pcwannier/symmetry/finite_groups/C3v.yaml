# point_action uses the 120-degree hexagonal fractional basis. Irrep matrices
# use an orthonormal internal (x, y) basis and may therefore contain sqrt(3).
name: C3v
dimension: 2
elements:
  - name: E
    point_action: [[1, 0], [0, 1]]
  - name: C3
    point_action: [[0, -1], [1, -1]]
  - name: C3_inv
    point_action: [[-1, 1], [-1, 0]]
  - name: sigma_1
    point_action: [[0, 1], [1, 0]]
  - name: sigma_2
    point_action: [[1, -1], [0, -1]]
  - name: sigma_3
    point_action: [[-1, 0], [-1, 1]]
irreps:
  A1:
    dimension: 1
    characters: {E: 1, C3: 1, C3_inv: 1, sigma_1: 1, sigma_2: 1, sigma_3: 1}
  A2:
    dimension: 1
    characters: {E: 1, C3: 1, C3_inv: 1, sigma_1: -1, sigma_2: -1, sigma_3: -1}
  E:
    dimension: 2
    characters: {E: 2, C3: -1, C3_inv: -1, sigma_1: 0, sigma_2: 0, sigma_3: 0}
    generators:
      C3: [["-1/2", "-sqrt(3)/2"], ["sqrt(3)/2", "-1/2"]]
      # sigma_2 is the x-axis mirror for a1=(1,0), a2=(-1/2,sqrt(3)/2).
      sigma_2: [[1, 0], [0, -1]]
