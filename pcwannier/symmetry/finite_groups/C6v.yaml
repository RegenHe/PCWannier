# point_action uses the 120-degree hexagonal fractional basis. Irrep matrices
# use an orthonormal internal basis and may therefore contain sqrt(3).
name: C6v
dimension: 2
elements:
  - name: E
    point_action: [[1, 0], [0, 1]]
  - name: C6
    point_action: [[1, -1], [1, 0]]
  - name: C3
    point_action: [[0, -1], [1, -1]]
  - name: C2
    point_action: [[-1, 0], [0, -1]]
  - name: C3_inv
    point_action: [[-1, 1], [-1, 0]]
  - name: C6_inv
    point_action: [[0, 1], [-1, 1]]
  - name: sigma_v1
    point_action: [[0, 1], [1, 0]]
  - name: sigma_v2
    point_action: [[1, -1], [0, -1]]
  - name: sigma_v3
    point_action: [[-1, 0], [-1, 1]]
  - name: sigma_d1
    point_action: [[0, -1], [-1, 0]]
  - name: sigma_d2
    point_action: [[-1, 1], [0, 1]]
  - name: sigma_d3
    point_action: [[1, 0], [1, -1]]
irreps:
  A1:
    dimension: 1
    characters: {E: 1, C6: 1, C3: 1, C2: 1, C3_inv: 1, C6_inv: 1, sigma_v1: 1, sigma_v2: 1, sigma_v3: 1, sigma_d1: 1, sigma_d2: 1, sigma_d3: 1}
  A2:
    dimension: 1
    characters: {E: 1, C6: 1, C3: 1, C2: 1, C3_inv: 1, C6_inv: 1, sigma_v1: -1, sigma_v2: -1, sigma_v3: -1, sigma_d1: -1, sigma_d2: -1, sigma_d3: -1}
  B1:
    dimension: 1
    characters: {E: 1, C6: -1, C3: 1, C2: -1, C3_inv: 1, C6_inv: -1, sigma_v1: 1, sigma_v2: 1, sigma_v3: 1, sigma_d1: -1, sigma_d2: -1, sigma_d3: -1}
  B2:
    dimension: 1
    characters: {E: 1, C6: -1, C3: 1, C2: -1, C3_inv: 1, C6_inv: -1, sigma_v1: -1, sigma_v2: -1, sigma_v3: -1, sigma_d1: 1, sigma_d2: 1, sigma_d3: 1}
  E1:
    dimension: 2
    characters: {E: 2, C6: 1, C3: -1, C2: -2, C3_inv: -1, C6_inv: 1, sigma_v1: 0, sigma_v2: 0, sigma_v3: 0, sigma_d1: 0, sigma_d2: 0, sigma_d3: 0}
    generators:
      C6: [["1/2", "-sqrt(3)/2"], ["sqrt(3)/2", "1/2"]]
      # sigma_v2 is the x-axis mirror for a1=(1,0), a2=(-1/2,sqrt(3)/2).
      sigma_v2: [[1, 0], [0, -1]]
  E2:
    dimension: 2
    characters: {E: 2, C6: -1, C3: -1, C2: 2, C3_inv: -1, C6_inv: -1, sigma_v1: 0, sigma_v2: 0, sigma_v3: 0, sigma_d1: 0, sigma_d2: 0, sigma_d3: 0}
    generators:
      C6: [["-1/2", "-sqrt(3)/2"], ["sqrt(3)/2", "-1/2"]]
      sigma_v2: [[1, 0], [0, -1]]
