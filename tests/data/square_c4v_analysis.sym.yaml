dimension: 2
tolerance: 1.0e-8

symmetry_operations:
  - name: E
    rotation: [[1, 0], [0, 1]]
    translation: [0.0, 0.0]
  - name: C4
    rotation: [[0, -1], [1, 0]]
    translation: [0.0, 0.0]
  - name: C2
    rotation: [[-1, 0], [0, -1]]
    translation: [0.0, 0.0]
  - name: C4_inv
    rotation: [[0, 1], [-1, 0]]
    translation: [0.0, 0.0]
  - name: sigma_x
    rotation: [[-1, 0], [0, 1]]
    translation: [0.0, 0.0]
  - name: sigma_y
    rotation: [[1, 0], [0, -1]]
    translation: [0.0, 0.0]
  - name: sigma_d
    rotation: [[0, 1], [1, 0]]
    translation: [0.0, 0.0]
  - name: sigma_d2
    rotation: [[0, -1], [-1, 0]]
    translation: [0.0, 0.0]

wannier_targets:
  - name: square_2c_A1
    center: [0.5, 0.0]
    site_irrep:
      name: A1
      dimension: 1
      matrices:
        identity: [[1.0]]
        generators:
          - operation: C2
            matrix: [[1.0]]
          - operation: sigma_y
            matrix: [[1.0]]

representation_analysis:
  field_kind: scalar
  degeneracy_tolerance:
    absolute: 1.0e-6
    relative: 1.0e-8
  points:
    - name: Gamma
      k: [0.0, 0.0]
      targets: [square_2c_A1]
      conjugacy_classes:
        E: [E]
        C4: [C4, C4_inv]
        C2: [C2]
        sigma_v: [sigma_x, sigma_y]
        sigma_d: [sigma_d, sigma_d2]
      irreps: &c4v_irreps
        A1:
          class_characters: {E: 1, C4: 1, C2: 1, sigma_v: 1, sigma_d: 1}
        A2:
          class_characters: {E: 1, C4: 1, C2: 1, sigma_v: -1, sigma_d: -1}
        B1:
          class_characters: {E: 1, C4: -1, C2: 1, sigma_v: 1, sigma_d: -1}
        B2:
          class_characters: {E: 1, C4: -1, C2: 1, sigma_v: -1, sigma_d: 1}
        E:
          class_characters: {E: 2, C4: 0, C2: -2, sigma_v: 0, sigma_d: 0}
    - name: X
      k: [0.5, 0.0]
      targets: [square_2c_A1]
      conjugacy_classes:
        E: [E]
        C2: [C2]
        sigma_x: [sigma_x]
        sigma_y: [sigma_y]
      irreps:
        A1:
          class_characters: {E: 1, C2: 1, sigma_x: 1, sigma_y: 1}
        A2:
          class_characters: {E: 1, C2: 1, sigma_x: -1, sigma_y: -1}
        B1:
          class_characters: {E: 1, C2: -1, sigma_x: 1, sigma_y: -1}
        B2:
          class_characters: {E: 1, C2: -1, sigma_x: -1, sigma_y: 1}
    - name: M
      k: [0.5, 0.5]
      targets: [square_2c_A1]
      conjugacy_classes:
        E: [E]
        C4: [C4, C4_inv]
        C2: [C2]
        sigma_v: [sigma_x, sigma_y]
        sigma_d: [sigma_d, sigma_d2]
      irreps: *c4v_irreps
